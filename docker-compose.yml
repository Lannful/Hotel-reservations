name: booking-project

services:
  db:
    image: postgres:18
    container_name: booking_db
    volumes:
      - postgresdata:/var/lib/postgresql
    env_file:
      - .env-non-dev
    ports:
      - "5432:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: booking_redis
    networks:
      - app-network

  booking:
    build: .
    image: booking_image
    container_name: booking_app
    env_file:
      - .env-non-dev
    depends_on:
      - db
      - redis
    ports:
      - "7777:8000"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery:
    image: booking_image
    container_name: booking_celery
    env_file:
      - .env-non-dev
    depends_on:
      - db
      - redis
    command: celery -A app.tasks.celery:celery_app worker -l INFO
    networks:
      - app-network

  flower:
    image: booking_image
    container_name: booking_flower
    env_file:
      - .env-non-dev
    depends_on:
      - celery
    command: celery -A app.tasks.celery:celery_app flower
    ports:
      - "5555:5555"
    networks:
      - app-network

  prometheus:
    image: prom/prometheus:v3.9.1
    container_name: prometheus
    user: "root"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    networks:
      - app-network
    depends_on:
      - booking

  grafana:
    image: grafana/grafana:12.3.3
    container_name: grafana
    user: "472:472"
    volumes:
      - grafanadata:/var/lib/grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - app-network
    depends_on:
      - prometheus

volumes:
  postgresdata:
  prometheusdata:
  grafanadata:

networks:
  app-network:
    driver: bridge

